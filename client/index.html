<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <link rel="stylesheet" href="style.css">
    <script src="/socket.io/socket.io.js"></script>
</head>

<body>

<div class="container">

    <div class="sidebar">
        <!-- Auth View -->
        <div id="auth-view">
            <h2>👤 Authenticate</h2>
            <input id="username" placeholder="Enter username" type="text" autocomplete="username">
            <input id="password" placeholder="Enter password" type="password" autocomplete="current-password" style="margin-top: 5px;">
            <div class="auth-buttons" style="display: flex; gap: 5px; margin-top: 8px;">
                <button onclick="login()" style="flex: 1;">Login</button>
                <button onclick="register()" style="flex: 1;">Register</button>
            </div>
            <div id="auth-status" style="margin-top: 8px; font-size: 12px; color: #ff6b6b; font-weight: bold; min-height: 18px;"></div>
        </div>

        <!-- Chat Session View (hidden initially) -->
        <div id="session-view" style="display: none;">
            <h2>👤 <span id="display-username"></span></h2>
            <button onclick="logout()" style="width: 100%; margin-bottom: 10px;">Logout</button>
            <ul id="users"></ul>
        </div>
    </div>

    <div class="chat-area">

        <div class="chat-header">
            <h3>💬 Chat</h3>

            <div class="tabs">
                <button id="privateTab" class="active" onclick="switchTab('private')">Private</button>
                <button id="groupTab" onclick="switchTab('group')">Group</button>
                <button onclick="toggleMode()">🌗</button>
            </div>
        </div>

        <div id="messages"></div>

        <div id="typing"></div>

        <div class="input-area">
            <input id="toUser" readonly placeholder="Select user">
            <input id="message" placeholder="Type message...">
            <button onclick="send()">Send</button>
        </div>

    </div>
</div>

<audio id="notifSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
